<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-primary/40 backdrop-blur-sm transition-all animate-fade-in">

  <div class="bg-surface-container-lowest rounded-[2rem] p-8 max-w-sm w-full shadow-2xl relative border border-white/20 transform transition-all scale-100">

    <div class="w-16 h-16 bg-error-container rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
      <span class="material-symbols-outlined text-4xl text-error">delete_forever</span>
    </div>

    <div class="text-center mb-8">
      <h3 class="text-2xl font-extrabold text-primary font-headline tracking-tight mb-2">{{ title }}</h3>
      <p class="text-sm font-medium text-on-surface-variant leading-relaxed">
        {{ message }}
      </p>
    </div>

    <div class="flex gap-4">
      <button
        (click)="onCancel()"
        [disabled]="isLoading"
        class="flex-1 py-3 px-4 rounded-xl font-headline font-bold text-sm tracking-widest uppercase bg-surface-container-high text-primary hover:bg-surface-variant transition-colors disabled:opacity-50">
        Cancelar
      </button>

      <button
        (click)="onConfirm()"
        [disabled]="isLoading"
        class="flex-1 py-3 px-4 flex justify-center items-center gap-2 rounded-xl font-headline font-bold text-sm tracking-widest uppercase bg-error text-on-error shadow-lg hover:shadow-error/30 hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-70 disabled:hover:scale-100">
        <span *ngIf="isLoading" class="material-symbols-outlined animate-spin text-lg">progress_activity</span>
        {{ isLoading ? 'Borrando...' : 'Eliminar' }}
      </button>
    </div>

  </div>
</div>
