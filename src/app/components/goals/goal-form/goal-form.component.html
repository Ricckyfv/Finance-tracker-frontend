<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-primary/20 backdrop-blur-sm transition-all animate-fade-in">
  <div class="bg-surface-container-lowest rounded-[2rem] p-8 max-w-md w-full shadow-2xl relative">

    <div class="flex justify-between items-center mb-6">
      <div>
        <h3 class="text-2xl font-extrabold text-primary font-headline tracking-tight">Nueva Meta</h3>
        <p class="text-sm text-on-surface-variant">Define tu próximo objetivo financiero.</p>
      </div>
      <button (click)="closeModal()" class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:text-primary hover:bg-surface-variant transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="space-y-5 relative">

      <div class="relative z-50">
        <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Categoría del Objetivo</label>

        <button type="button" (click)="toggleDropdown()"
                class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary text-on-surface flex items-center justify-between transition-colors hover:bg-surface-container-low">

          <div class="flex items-center gap-3">
            <ng-container *ngIf="selectedCategoryObj; else placeholderTemplate">
              <div class="w-8 h-8 rounded-lg bg-primary/10 text-primary flex items-center justify-center">
                <span class="material-symbols-outlined text-[18px]">{{ selectedCategoryObj.icon }}</span>
              </div>
              <span class="font-bold text-sm">{{ selectedCategoryObj.label }}</span>
            </ng-container>

            <ng-template #placeholderTemplate>
              <span class="text-outline-variant font-medium">Selecciona una categoría</span>
            </ng-template>
          </div>

          <span class="material-symbols-outlined text-outline-variant transition-transform duration-200" [class.rotate-180]="isDropdownOpen">expand_more</span>
        </button>

        <div *ngIf="isDropdownOpen" (click)="isDropdownOpen = false" class="fixed inset-0 z-40"></div>

        <div *ngIf="isDropdownOpen"
             class="absolute z-50 w-full mt-2 bg-surface-container-lowest border border-surface-variant rounded-xl shadow-xl max-h-56 overflow-y-auto py-2 animate-fade-in">

          <button *ngFor="let cat of goalCategories"
                  type="button"
                  (click)="selectCategory(cat.value)"
                  class="w-full flex items-center gap-3 px-4 py-3 hover:bg-surface-container-low transition-colors text-left group"
                  [class.bg-primary-container]="newGoal.goalCategory === cat.value">

            <div class="w-8 h-8 rounded-lg flex items-center justify-center transition-colors"
                 [ngClass]="newGoal.goalCategory === cat.value ? 'bg-primary/20 text-primary' : 'bg-surface-variant text-on-surface-variant group-hover:bg-primary/10 group-hover:text-primary'">
              <span class="material-symbols-outlined text-[18px]">{{ cat.icon }}</span>
            </div>

            <span class="font-medium text-sm flex-1" [ngClass]="newGoal.goalCategory === cat.value ? 'text-primary font-bold' : 'text-on-surface'">
              {{ cat.label }}
            </span>

            <span *ngIf="newGoal.goalCategory === cat.value" class="material-symbols-outlined text-primary text-sm">check</span>
          </button>
        </div>
      </div>

      <div class="relative z-10">
        <label for="goalDescription" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Detalle de la meta</label>
        <input type="text" id="goalDescription" name="goalDescription" [(ngModel)]="newGoal.description" placeholder="Ej: Viaje a Japón 2026..."
               class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-primary font-medium focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-on-surface-variant/40">
      </div>

      <div class="relative z-10">
        <label for="goalAmount" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Cantidad a alcanzar ($)</label>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">$</span>
          <input type="number" id="goalAmount" name="goalAmount" [(ngModel)]="newGoal.targetAmount" placeholder="10000"
                 class="w-full bg-surface-container-low border-none rounded-xl pl-8 pr-4 py-3 text-primary font-bold focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-on-surface-variant/40">
        </div>
      </div>

      <div class="relative z-10">
        <label for="goalDate" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Fecha Límite (Opcional)</label>
        <input type="date" id="goalDate" name="goalDate" [(ngModel)]="newGoal.deadline"
               class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-primary font-medium focus:ring-2 focus:ring-primary/20 transition-all">
      </div>

    </div>

    <button (click)="saveGoal()"
            [disabled]="!newGoal.goalCategory || !newGoal.targetAmount || isSaving"
            class="w-full mt-8 bg-primary text-white py-4 rounded-xl font-headline font-bold text-sm tracking-widest uppercase hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2">
      <span *ngIf="isSaving" class="material-symbols-outlined animate-spin text-lg">progress_activity</span>
      {{ isSaving ? 'Creando...' : 'Crear Meta' }}
    </button>
  </div>
</div>
